# Development compose — mounts source for hot reload via nodemon.
# Run from project root:
#   docker compose -f docker/docker-compose.dev.yml up

services:
  app:
    image: node:20-alpine
    container_name: foodlink-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: debug
      SESSION_SECRET: dev_secret_please_change_me_dev_only
      FIREBASE_SERVICE_ACCOUNT: ./serviceAccountKey.json
    ports:
      - "3000:3000"
    volumes:
      - ../:/app
      - /app/node_modules
